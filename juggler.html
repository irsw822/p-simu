<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <title>juggler</title>
  <link href="juggler.css" rel="stylesheet" type="text/css">
</head>
<body>
  <script src="juggler.js"></script>
  <div id="loading" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(0,0,0,0.5); color: white; font-size: 4em; display: flex; 
    justify-content: center; align-items: center; z-index: 9999;">
    読み込み中...
  </div>
  <div class=div_title>
    <p>I'm juggler</p>
  </div>
  <div class=div_description>
    <p>Big:5% Regular:5% Grape:15% Replay:15%</p>
  </div>
  <div class=div_body1><img src="png/body1.jpg"/></div>
  <div class=div_main>
    <div class=div_result><img id="id_result1" src="png/big.png"/></div>
    <div class=div_result><img id="id_result2" src="png/reg.png"/></div>
    <div class=div_result><img id="id_result3" src="png/big.png"/></div>
  </div>
  <div class=div_sub>
    <div class=div_lamp>
      <img id="id_lamp" src="png/lamp_off.png"/>      
    </div> 
      <p id="id_status">-</p>
  </div> 
  <div class=div_button>
    <button id="id_button" class="button_push">PUSH</button>
  </div> 
  <div class=div_body2>
    <img src="png/body2.jpg"/>
  </div>
</body>
</html>
